# Sentinel basic auth reverse proxy example.
# Example only. Do not deploy without adapting domains, TLS and paths.
# Do not commit htpasswd files or credentials.
# Generate htpasswd securely on the server and store it outside the repo.

server {
    listen 443 ssl http2;
    server_name sentinel.example.test;

    # TLS placeholders. Configure real certificates on the server.
    ssl_certificate /etc/letsencrypt/live/sentinel.example.test/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentinel.example.test/privkey.pem;

    # Public stakeholder route can remain unprotected if required.
    location = /seo-progress {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Operator route must be protected before exposure.
    location /seo-roadmap {
        auth_basic "Sentinel Operator";
        auth_basic_user_file /srv/sentinel/security/sentinel.htpasswd;

        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keep the API localhost-only until proper auth exists.
    # Do not enable this location publicly yet.
    # location /sentinel-api/ {
    #     auth_basic "Sentinel Operator";
    #     auth_basic_user_file /srv/sentinel/security/sentinel.htpasswd;
    #
    #     proxy_pass http://127.0.0.1:4317/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
