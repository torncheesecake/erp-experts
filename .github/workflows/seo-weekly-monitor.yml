name: SEO Weekly Monitor

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run SEO pipeline
        run: npm run seo:pipeline

      - name: Show SEO stats
        run: npm run seo:stats

      - name: Weekly monitor report
        run: npm run seo:monitor

      - name: Weekly monitor summary
        run: npm run seo:monitor:summary

      - name: SEO autopilot orchestration
        run: npm run seo:autopilot

      - name: Upload SEO reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-weekly-reports
          if-no-files-found: warn
          path: |
            reports/resource-qa-report.json
            reports/seo-action-briefs.json
            reports/seo-weekly-summary.json
            reports/seo-pipeline-summary.json
            reports/seo-autopilot-report.md
            reports/seo-autopilot-report.json
